<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Barang - Login</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background-color: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0d47a1;
    }
    .btn-scan {
      background-color: #2e7d32;
      margin-top: 0;
    }
    .btn-scan:hover {
      background-color: #1b5e20;
    }
    #reader {
      width: 100%;
      background: #000;
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    .user-info {
      font-size: 14px;
      color: #666;
      text-align: right;
      margin-bottom: 10px;
    }
    label {
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Form Login & Pilihan Tipe Transaksi -->
  <div id="loginForm">
    <h2>Login</h2>
    <input type="text" id="userId" placeholder="User ID" required>
    <input type="password" id="password" placeholder="Password" required>
    
    <label for="loginAktivitas">Tipe Transaksi:</label>
    <select id="loginAktivitas" required>
      <option value="" disabled selected>-- Pilih Tipe Transaksi --</option>
      <option value="Picking">Picking</option>
      <option value="Put Away">Put Away</option>
    </select>

    <button onclick="login()">Login</button>
  </div>

  <!-- Form Utama Input Barang -->
  <div id="mainForm" style="display:none;">
    <div class="user-info" id="userDisplay">User: -</div>
    <h2>Form Input Barang</h2>
    
    <div id="reader" style="display: none;"></div>

    <form id="returForm">
      <!-- Input Lokasi -->
      <label>Lokasi:</label>
      <input type="text" name="lokasi" id="lokasi" placeholder="Contoh: Rak A-01" required>

      <label>Nama Barang / Barcode:</label>
      <input type="text" name="nama_barang" id="nama_barang" placeholder="Scan atau ketik manual" required>
      <button type="button" class="btn-scan" id="btnScanAction" onclick="toggleKamera()">📷 Aktifkan Kamera Scan</button>
      
      <input type="number" name="jumlah" placeholder="Jumlah" required>
      
      <button type="submit">Kirim Data</button>
    </form>
  </div>
</div>

<script>
  // 1. DATA MASTER USER
  const LIST_USER = {
    "SCFRESH": "12345",
    "OPERATOR": "12345",
    "TIKO": "12345",
    "FITRI": "12345",
    "ADI": "12345"
  };

  let currentUser = ""; 
  let currentAktivitas = "";

  function login() {
    const user = document.getElementById("userId").value.trim();
    const pass = document.getElementById("password").value;
    const aktivitas = document.getElementById("loginAktivitas").value;

    if (!user || !pass) {
      alert("User ID dan Password harus diisi!");
      return;
    }

    if (!aktivitas) {
      alert("Silakan pilih Tipe Transaksi terlebih dahulu!");
      return;
    }

    if (LIST_USER[user] && LIST_USER[user] === pass) {
      currentUser = user; 
      currentAktivitas = aktivitas;

      // Tampilkan informasi di bagian atas form utama
      document.getElementById("userDisplay").innerText = "Operator: " + currentUser + " | Tipe: " + currentAktivitas;
      
      // Sembunyikan login, tampilkan form utama
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("mainForm").style.display = "block";
    } else {
      alert("User ID atau Password salah");
    }
  }

  // OPERASIONAL SCANNER UTAMA
  let html5Qrcode = null;

  function toggleKamera() {
    const readerElement = document.getElementById("reader");
    const btnScan = document.getElementById("btnScanAction");

    if (readerElement.style.display === "none") {
      readerElement.style.display = "block";
      btnScan.innerText = "❌ Matikan Kamera";
      btnScan.style.backgroundColor = "#d32f2f";

      if (!html5Qrcode) {
        html5Qrcode = new Html5Qrcode("reader");
      }

      html5Qrcode.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 250, height: 150 } },
        (decodedText) => {
          document.getElementById("nama_barang").value = decodedText;
          matikanKameraSaja();
        },
        (errorMessage) => {
          // Abaikan log error scanning realtime
        }
      ).catch(err => {
        alert("Akses kamera ditolak/gagal: " + err);
        matikanKameraSaja();
      });

    } else {
      matikanKameraSaja();
    }
  }

  function matikanKameraSaja() {
    const readerElement = document.getElementById("reader");
    const btnScan = document.getElementById("btnScanAction");
    
    if (html5Qrcode && html5Qrcode.isScanning) {
      html5Qrcode.stop().then(() => {
        readerElement.style.display = "none";
        btnScan.innerText = "📷 Aktifkan Kamera Scan";
        btnScan.style.backgroundColor = "#2e7d32";
      }).catch(err => {
        console.error("Gagal menghentikan track kamera:", err);
      });
    } else {
      readerElement.style.display = "none";
      btnScan.innerText = "📷 Aktifkan Kamera Scan";
      btnScan.style.backgroundColor = "#2e7d32";
    }
  }

  // Alur Kirim ke Google Sheets
  const scriptURL = 'https://script.google.com/macros/s/AKfycbx_lRibuGnVTaxQ1PpWqaKdeklG1yU2N6GN42q375Jd1HDDC_2Bv1ZVdy-XTcpMy5zCwA/exec';
  const form = document.getElementById('returForm');

  form.addEventListener('submit', e => {
    e.preventDefault();
    matikanKameraSaja();

    const formData = new FormData(form);
    const sekarang = new Date();
    const opsiWaktu = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    
    // Masukkan data tambahan ke FormData agar ikut terkirim ke Google Sheets
    formData.append('aktivitas', currentAktivitas);
    formData.append('tanggal_masuk', sekarang.toLocaleString('id-ID', opsiWaktu));
    formData.append('operator', currentUser);

    alert("Data berhasil dikirim!"); 
    form.reset();

    fetch(scriptURL, { method: 'POST', body: formData })
      .then(res => console.log("Sukses sinkronisasi Google Sheets"))
      .catch(err => console.error("Eror sinkronisasi latar belakang:", err));
  });
</script>

</body>
</html>
